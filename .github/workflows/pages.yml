name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp results.tsv _site/ 2>/dev/null || true
          cp experiments_plot.png _site/ 2>/dev/null || true
          cp samples.json _site/ 2>/dev/null || true
          cp samples_*.json _site/ 2>/dev/null || true
          cp torch.html _site/ 2>/dev/null || true
          cp results_torch.tsv _site/ 2>/dev/null || true
          cp experiments_torch_plot.png _site/ 2>/dev/null || true
          cp samples_torch*.json _site/ 2>/dev/null || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
